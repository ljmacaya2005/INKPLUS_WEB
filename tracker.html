<!doctype html>
<html lang="en" data-theme="auto">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>INKPlus — Repair Status</title>
    <link rel="icon" type="image/x-icon" href="assets/logo2.png">
    <!-- Bootstrap 5.3 CSS -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts - Inter -->
    <link href="css/fonts.css" rel="stylesheet">
    <!-- Animate.css -->
    <link rel="stylesheet" href="css/animate.min.css" />

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css"> <!-- Reuse login styles for background/card -->

    <style>
        /* Specific tweaks for tracker */
        .status-card {
            display: none;
            /* Hidden by default */
        }

        .status-badge-lg {
            font-size: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 50px;
        }

        /* FIX: login.css hides .login-card by default (for splash animation). 
           We accept animate.css control here, so we reset it. */
        .login-card,
        .login-card .brand,
        .login-card .desc,
        .login-card .mb-3,
        .login-card .mb-4,
        .login-card .d-grid,
        .login-card .legal-text {
            opacity: 1 !important;
            transform: none !important;
        }

        .brand-text {
            color: var(--brand-color);
        }

        /* FIX: High contrast placeholder */
        #ticketIdInput::placeholder {
            color: var(--text-color) !important;
            opacity: 0.7 !important;
            /* Make it clearly visible but distinct from input */
        }
    </style>
    <script src="js/sweetalert2.all.min.js"></script>
</head>

<body>


    <main class="login-wrapper min-vh-100">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6 col-xl-5">

                    <!-- Main Search Card -->
                    <div class="login-card animate__animated animate__fadeInUp p-5 shadow-lg" id="searchCard">
                        <div class="text-center mb-4">
                            <a href="index.html">
                                <img src="assets/logo1.png" alt="INKPlus Logo" class="img-fluid mb-3"
                                    style="max-width: 150px;">
                            </a>
                            <h3 class="fw-bold" style="color: var(--text-color);">Repair Status Tracker</h3>
                            <p style="color: var(--text-color); opacity: 0.9;">Enter your reference code to check
                                progress.</p>
                        </div>

                        <form id="trackerForm">
                            <div class="mb-4">
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text border-end-0 fw-bold"
                                        style="background-color: var(--input-bg); border-color: var(--input-border-color); color: var(--text-color);">#</span>
                                    <input type="text" class="form-control border-start-0" id="ticketIdInput"
                                        placeholder="INK-1001" required
                                        style="text-transform: uppercase; color: var(--text-color); background-color: var(--input-bg);">
                                </div>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg primary" id="btnSearch">
                                    Track Repair
                                </button>
                            </div>
                        </form>

                        <div class="text-center mt-4">
                            <a href="index.html" class="text-decoration-none small"
                                style="color: var(--text-color); opacity: 0.8;">
                                &larr; Back to Login
                            </a>
                        </div>
                    </div>

                    <!-- Result Card (Populated by JS) -->
                    <div class="login-card animate__animated animate__fadeInUp mt-4 p-4 shadow-lg status-card"
                        id="resultCard">
                        <div class="text-center mb-4">
                            <span class="badge bg-primary mb-2" id="resTicketId">INK-XXXX</span>
                            <h4 class="fw-bold" id="resDevice" style="color: var(--text-color);">Device Name</h4>
                            <p class="small" id="resDate" style="color: var(--text-color); opacity: 0.8;">Created: --
                            </p>
                        </div>

                        <div class="status-indicator text-center p-4 rounded-3 mb-4"
                            style="background-color: var(--input-bg); border: 1px solid var(--border-color);">
                            <h2 class="fw-bold mb-0 text-primary" id="resStatus">Pending</h2>
                            <p class="small mb-0" style="color: var(--text-color); opacity: 0.9;">Current Status</p>
                        </div>

                        <!-- Progress Steps (Optional visual) -->
                        <div class="position-relative m-4">
                            <div class="progress" style="height: 4px; background-color: var(--input-border-color);">
                                <div class="progress-bar" role="progressbar" style="width: 0%;" id="resProgressBar">
                                </div>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-outline-secondary" onclick="resetTracker()"
                                style="color: var(--text-color); border-color: var(--border-color);">Check
                                Another</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <div class="quick-dock glass-dock">
        <div class="dock-content">
            <div class="dock-theme-wrapper">
                <button class="dock-btn" id="quick-theme-btn" title="Theme"></button>
                <div class="dock-theme-menu">
                    <button class="dock-theme-item" data-theme-value="light"><svg width="14" height="14"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg></button>
                    <button class="dock-theme-item" data-theme-value="dark"><svg width="14" height="14"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg></button>
                    <button class="dock-theme-item" data-theme-value="auto"><svg width="14" height="14"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                            <line x1="8" y1="21" x2="16" y2="21"></line>
                            <line x1="12" y1="17" x2="12" y2="21"></line>
                        </svg></button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>



    <script src="js/color-modes.js?v=2.0" defer></script>
    <script src="js/tracker.js?v=2.0" defer></script>
</body>

</html>
