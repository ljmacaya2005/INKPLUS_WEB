<!doctype html>
<html lang="en" data-theme="auto">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>INKPlus — Login</title>
    <link rel="icon" type="image/x-icon" href="images/logo2.png">
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">

    <style>
        /* This ensures the image container always has a size so it doesn't "delete" itself */
        .bean-animator picture,
        .bean-animator img {
            display: block;
            width: 100%;
            height: auto;
            max-width: 150px;
            /* Adjust this to make printers bigger or smaller */
        }

        /* Logic for manual theme toggle: If HTML has data-theme="dark", force dark image */
        [data-theme="dark"] .printer-img {
            content: url('images/printer-light.png');
        }

        /* Logic for manual theme toggle: If HTML has data-theme="light", force light image */
        [data-theme="light"] .printer-img {
            content: url('images/printer-dark.png');
        }

        /* Glassmorphism adjustment */
        .login-card {
            background: rgba(var(--card-bg-rgb), 0.8) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>

    <script src="js/sweetalert2.all.min.js"></script>
</head>

<body>
    <div id="splash" role="dialog" aria-label="Loading INKPlus">
        <div class="splash-content text-center">
            <img src="images/logo1.png" alt="INKPlus Logo" class="img-fluid mb-3 splash-logo">
            <div class="splash-progress-container mx-auto">
                <div class="splash-progress-bar"></div>
            </div>
        </div>
    </div>

    <div class="beans" id="beans" aria-hidden="true">
        <!-- Big Printers -->
        <div class="bean big faint"
            style="left:85%;top:-5%;--fromX:100vw;--fromY:-20vh;--rot:-360deg;--scale:1.2;--toRot:-12deg;--toScale:1;"
            data-delay="0.1">
            <div class="bean-animator" style="animation-delay: -2s;">
                <picture>
                    <source srcset="images/printer-dark.png" media="(prefers-color-scheme: dark)"><img
                        src="images/printer-light.png" class="printer-img" alt="">
                </picture>
            </div>
        </div>
        <div class="bean big faint"
            style="left:70%;top:80%;--fromX:100vw;--fromY:40vh;--rot:360deg;--scale:1.1;--toRot:15deg;--toScale:1;"
            data-delay="0.3">
            <div class="bean-animator" style="animation-delay: -5s;">
                <picture>
                    <source srcset="images/printer-dark.png" media="(prefers-color-scheme: dark)"><img
                        src="images/printer-light.png" class="printer-img" alt="">
                </picture>
            </div>
        </div>
        <div class="bean big faint"
            style="left:-10%;top:60%;--fromX:-100vw;--fromY:20vh;--rot:-180deg;--scale:1.3;--toRot:-25deg;--toScale:1;"
            data-delay="0.5">
            <div class="bean-animator" style="animation-delay: -1s;">
                <picture>
                    <source srcset="images/printer-dark.png" media="(prefers-color-scheme: dark)"><img
                        src="images/printer-light.png" class="printer-img" alt="">
                </picture>
            </div>
        </div>

        <!-- Medium Printers -->
        <div class="bean med faint"
            style="left:5%;top:5%;--fromX:-80vw;--fromY:-30vh;--rot:540deg;--scale:1;--toRot:10deg;--toScale:1;"
            data-delay="0.2">
            <div class="bean-animator" style="animation-delay: -3s;">
                <picture>
                    <source srcset="images/printer-dark.png" media="(prefers-color-scheme: dark)"><img
                        src="images/printer-light.png" class="printer-img" alt="">
                </picture>
            </div>
        </div>
        <div class="bean med solid"
            style="left:20%;top:75%;--fromX:-50vw;--fromY:100vh;--rot:-420deg;--scale:0.8;--toRot:0deg;--toScale:1;"
            data-delay="0.4">
            <div class="bean-animator" style="animation-delay: -6s;">
                <picture>
                    <source srcset="images/printer-dark.png" media="(prefers-color-scheme: dark)"><img
                        src="images/printer-light.png" class="printer-img" alt="">
                </picture>
            </div>
        </div>
        <div class="bean med faint"
            style="left:90%;top:40%;--fromX:120vw;--fromY:0vh;--rot:200deg;--scale:1;--toRot:-15deg;--toScale:1;"
            data-delay="0.6">
            <div class="bean-animator" style="animation-delay: -4s;">
                <picture>
                    <source srcset="images/printer-dark.png" media="(prefers-color-scheme: dark)"><img
                        src="images/printer-light.png" class="printer-img" alt="">
                </picture>
            </div>
        </div>

        <!-- Small Printers (Dense Layer) -->
        <div class="bean sm solid"
            style="left:12%;top:40%;--fromX:0px;--fromY:100vh;--rot:600deg;--scale:0.5;--toRot:5deg;--toScale:1;"
            data-delay="0.15">
            <div class="bean-animator" style="animation-delay: -2.5s;">
                <picture>
                    <source srcset="images/printer-dark.png" media="(prefers-color-scheme: dark)"><img
                        src="images/printer-light.png" class="printer-img" alt="">
                </picture>
            </div>
        </div>
        <div class="bean sm faint"
            style="left:40%;top:-10%;--fromX:0px;--fromY:-100vh;--rot:-300deg;--scale:0.7;--toRot:-10deg;--toScale:1;"
            data-delay="0.55">
            <div class="bean-animator" style="animation-delay: -7s;">
                <picture>
                    <source srcset="images/printer-dark.png" media="(prefers-color-scheme: dark)"><img
                        src="images/printer-light.png" class="printer-img" alt="">
                </picture>
            </div>
        </div>
        <div class="bean sm solid"
            style="left:80%;top:30%;--fromX:100vw;--fromY:-50vh;--rot:90deg;--scale:0.6;--toRot:20deg;--toScale:1;"
            data-delay="0.7">
            <div class="bean-animator" style="animation-delay: -1.5s;">
                <picture>
                    <source srcset="images/printer-dark.png" media="(prefers-color-scheme: dark)"><img
                        src="images/printer-light.png" class="printer-img" alt="">
                </picture>
            </div>
        </div>
    </div>

    <main class="login-wrapper min-vh-100">
        <div class="login-card animate__animated animate__fadeInUp" id="loginCard">
            <div class="login-left">
                <div class="brand mb-4">
                    <img src="images/logo1.png" alt="INKPlus Logo" class="img-fluid" style="max-width: 180px;">
                </div>
                <p class="text-center desc mb-4">Welcome back — sign in to access your scheduling dashboard.</p>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input id="username" name="username" type="text" class="form-control"
                            placeholder="Enter your username" maxlength="50">
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="password-wrapper position-relative">
                            <input id="password" name="password" type="password" class="form-control pe-5"
                                placeholder="••••••••" maxlength="20" autocomplete="off">
                            <button type="button"
                                class="password-toggle btn p-0 border-0 position-absolute end-0 top-50 translate-middle-y me-3"
                                id="passwordToggle" aria-label="Show password">
                                <svg class="eye-icon eye-hidden" xmlns="http://www.w3.org/2000/svg" width="20"
                                    height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path
                                        d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                                    </path>
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                </svg>
                                <svg class="eye-icon eye-visible" xmlns="http://www.w3.org/2000/svg" width="20"
                                    height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="d-grid mb-4">
                        <button class="btn btn-primary btn-lg primary" type="submit">Sign in</button>
                    </div>

                    <div class="legal-text text-center">
                        <p class="mb-0">By logging in, you agree to the <br>
                            <a href="#" class="text-info text-decoration-none fw-bold"
                                onclick="showTermsModal(event)">Terms of Service</a> &
                            <a href="#" class="text-info text-decoration-none fw-bold"
                                onclick="showPrivacyModal(event)">Privacy Policy</a>.
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div class="quick-dock glass-dock">
        <div class="dock-content">
            <button class="dock-btn" id="dockFull" title="Fullscreen" onclick="toggleFullScreen()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
                </svg>
            </button>
            <div class="dock-separator"></div>
            <button class="dock-btn" id="fabRefresh" title="Refresh Page">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 4v6h-6"></path>
                    <path d="M1 20v-6h6"></path>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
            </button>
            <div class="dock-separator"></div>
            <div class="dock-theme-wrapper">
                <button class="dock-btn" id="quick-theme-btn" title="Theme">
                    <!-- Icon injected by JS -->
                </button>
                <div class="dock-theme-menu">
                    <button class="dock-theme-item" data-theme-value="light"><svg width="14" height="14"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg></button>
                    <button class="dock-theme-item" data-theme-value="dark"><svg width="14" height="14"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg></button>
                    <button class="dock-theme-item" data-theme-value="auto"><svg width="14" height="14"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                            <line x1="8" y1="21" x2="16" y2="21"></line>
                            <line x1="12" y1="17" x2="12" y2="21"></line>
                        </svg></button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Firebase Compat Libraries (Works on file://) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js?v=2.0"></script>

    <script src="js/login.js?v=2.0" defer></script>
    <script src="js/color-modes.js?v=2.0" defer></script>

    <div class="version-island">
        <div class="status-dot"></div> <span class="version-label">System Version</span>
        <span class="version-number">v2.1.1</span>
    </div>
</body>

</html>
