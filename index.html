<!doctype html>
<html lang="en" data-theme="auto">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>INKPlus — Login</title>
    <link rel="icon" type="image/x-icon" href="assets/logo2.png">
    <!-- Bootstrap 5.3 CSS -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts - Inter -->
    <link href="css/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">

    <style>
        /* Glassmorphism adjustment */
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/animate.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="js/sweetalert2.all.min.js"></script>
</head>

<body>
    <div id="splash" role="dialog" aria-label="Loading INKPlus" style="display: none;">
        <div class="splash-content text-center">
            <img src="assets/logo1.png" alt="INKPlus Logo" class="img-fluid mb-3 splash-logo">
            <div class="splash-progress-container mx-auto">
                <div class="splash-progress-bar"></div>
            </div>
        </div>
    </div>



    <main class="login-wrapper min-vh-100">
        <div class="login-card animate__animated animate__fadeInUp" id="loginCard">
            <div class="login-flipper" id="loginFlipper">
                <!-- Front Face: Login Form -->
                <div class="login-face login-front">
                    <div class="login-left">
                        <div class="brand mb-4 user-select-none">
                            <img src="assets/logo1.png" alt="INKPlus Logo" class="img-fluid user-select-none"
                                style="max-width: 140px;" draggable="false">
                        </div>
                        <p class="text-center desc mb-4 user-select-none">Sign in to continue.</p>

                        <form id="loginForm" onsubmit="handleLogin(event)">
                            <div class="mb-3">
                                <label for="email" class="form-label user-select-none">Email Address</label>
                                <input id="email" name="email" type="email" class="form-control"
                                    placeholder="name@company.com" maxlength="50" required>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label user-select-none">Password</label>
                                <div class="password-wrapper position-relative">
                                    <input id="password" name="password" type="password" class="form-control pe-5"
                                        placeholder="••••••••" maxlength="20" autocomplete="off">
                                    <button type="button"
                                        class="password-toggle btn p-0 border-0 position-absolute end-0 top-50 translate-middle-y me-3"
                                        id="passwordToggle" aria-label="Show password"
                                        onclick="window.togglePassword('password', this)">
                                        <svg class="eye-icon eye-hidden" xmlns="http://www.w3.org/2000/svg" width="20"
                                            height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path
                                                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                                            </path>
                                            <line x1="1" y1="1" x2="23" y2="23"></line>
                                        </svg>
                                        <svg class="eye-icon eye-visible" xmlns="http://www.w3.org/2000/svg" width="20"
                                            height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                            style="display: none;">
                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                            <circle cx="12" cy="12" r="3"></circle>
                                        </svg>
                                    </button>
                                </div>
                                <div class="forgot-password">
                                    <a href="#" class="small" onclick="showForgot(event)">Forgot Password?</a>
                                </div>
                            </div>

                            <div class="d-grid mb-4">
                                <button class="btn btn-primary btn-lg primary" type="submit">Sign in</button>
                            </div>

                            <div class="legal-text text-center">
                                <p class="mb-0">By continuing, you acknowledge our <br>
                                    <a href="#" class="text-info text-decoration-none fw-bold"
                                        onclick="showTermsModal(event)">Terms of Service</a> &
                                    <a href="#" class="text-info text-decoration-none fw-bold"
                                        onclick="showPrivacyModal(event)">Privacy Policy</a>.
                                </p>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Back Face: Success Message -->
                <div class="login-face login-back">
                    <div class="success-content text-center">
                        <div class="success-icon mb-3">
                            <svg id="loginSuccessSvg" xmlns="http://www.w3.org/2000/svg" width="64" height="64"
                                viewBox="0 0 24 24" fill="none" stroke="#4A90A4" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="animate__animated animate__bounceIn">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                            </svg>
                            <img id="loginSuccessAvatar" src="" alt="User Avatar"
                                class="rounded-circle shadow-sm animate__animated animate__bounceIn d-none"
                                style="width: 64px; height: 64px; object-fit: cover;">
                        </div>
                        <h3 class="fw-bold mb-2">Login Successful!</h3>
                        <p class="text-muted" id="loginSuccessMessage">Welcome back, Administrator.</p>
                        <div class="spinner-border text-primary mt-3" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="quick-dock glass-dock">
        <div class="dock-content">
            <button class="dock-btn" id="dockFull" title="Fullscreen" onclick="toggleFullScreen()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
                </svg>
            </button>
            <div class="dock-separator"></div>
            <button class="dock-btn" id="fabRefresh" title="Refresh Page">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 4v6h-6"></path>
                    <path d="M1 20v-6h6"></path>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
            </button>
            <div class="dock-separator"></div>
            <div class="dock-theme-wrapper">
                <button class="dock-btn" id="quick-theme-btn" title="Theme">
                    <!-- Icon injected by JS -->
                </button>
                <div class="dock-theme-menu">
                    <button class="dock-theme-item" data-theme-value="light"><svg width="14" height="14"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg></button>
                    <button class="dock-theme-item" data-theme-value="dark"><svg width="14" height="14"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg></button>
                    <button class="dock-theme-item" data-theme-value="auto"><svg width="14" height="14"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                            <line x1="8" y1="21" x2="16" y2="21"></line>
                            <line x1="12" y1="17" x2="12" y2="21"></line>
                        </svg></button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>



    <script src="js/supabase-config.js" defer></script>
    <script src="js/login.js?v=2.0" defer></script>
    <script src="js/color-modes.js?v=2.0" defer></script>

    <div class="version-island">
        <div class="status-dot"></div> <span class="version-label">System Version</span>
        <span class="version-number">v4.2</span>
    </div>
</body>

</html>
